name: ci

on:
  pull_request:
    branches:
      - main

jobs:
  spelling:
      name: ✍️ Spelling Check
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Spell Check
          uses: streetsidesoftware/cspell-action@v6
          with:
            files: '**/*.md'
            config: 'config/cspell.json'
